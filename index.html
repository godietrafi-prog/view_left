<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Left</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /*
         * Screen is physically rotated 90° counterclockwise (left side down).
         * We compensate by rotating content 90° clockwise.
         * Width/height swapped: width=100vh, height=100vw fills the rotated viewport.
         * To flip direction: change rotate(90deg) → rotate(-90deg)
         */
        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Thin progress bar at bottom of the rotated view */
        #progress {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.45);
            width: 0%;
        }

        #empty-msg {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: sans-serif;
            font-size: 1.4em;
            gap: 0.8em;
            text-align: center;
        }
        #empty-msg small { opacity: 0.5; font-size: 0.6em; }
    </style>
</head>
<body>
    <div id="stage"></div>
    <div id="progress"></div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    const CONFIG = {
        defaultImageDuration: 8,    // seconds each image is shown
        transitionDuration:   1.0,  // seconds for fade in/out
        loop:    true,              // restart from beginning after last slide
        shuffle: false,             // randomize order on load
    };

    // ================================================================
    // SLIDES LIST
    // Add objects here to define the presentation order.
    //
    // Image:  { src: 'media/poster.jpg' }
    //         { src: 'media/poster.png', duration: 12 }   ← custom seconds
    //
    // Video:  { src: 'media/clip.mp4' }   ← plays to end, then advances
    // ================================================================
    const SLIDES = [
        // { src: 'media/example_poster.jpg' },
        // { src: 'media/example_video.mp4' },
    ];

    // ================================================================
    // ENGINE  (no edits needed below this line)
    // ================================================================
    const stage   = document.getElementById('stage');
    const progress = document.getElementById('progress');

    function isVideo(src) {
        return /\.(mp4|webm|ogg|mov)$/i.test(src);
    }

    if (SLIDES.length === 0) {
        const msg = document.createElement('div');
        msg.id = 'empty-msg';
        msg.innerHTML = 'No slides defined<br><small>Add entries to the SLIDES array in index.html</small>';
        document.body.appendChild(msg);
    }

    const list = CONFIG.shuffle ? [...SLIDES].sort(() => Math.random() - 0.5) : SLIDES;
    let slideEls = [];
    let current  = 0;
    let timer    = null;

    function buildSlides() {
        list.forEach((slide, i) => {
            const div = document.createElement('div');
            div.className = 'slide';

            if (isVideo(slide.src)) {
                const vid = document.createElement('video');
                vid.src        = slide.src;
                vid.muted      = true;
                vid.playsInline = true;
                vid.preload    = 'metadata';
                div.appendChild(vid);
                div.dataset.type = 'video';
            } else {
                const img  = document.createElement('img');
                img.src    = slide.src;
                img.alt    = '';
                img.loading = i === 0 ? 'eager' : 'lazy';
                div.appendChild(img);
                div.dataset.type     = 'image';
                div.dataset.duration = slide.duration ?? CONFIG.defaultImageDuration;
            }

            stage.appendChild(div);
            slideEls.push(div);
        });
    }

    function showSlide(index) {
        if (!slideEls.length) return;

        slideEls.forEach(el => {
            el.classList.remove('active');
            const v = el.querySelector('video');
            if (v) { v.pause(); v.onended = null; }
        });
        clearTimeout(timer);
        progress.style.transition = 'none';
        progress.style.width = '0%';

        current = ((index % slideEls.length) + slideEls.length) % slideEls.length;
        const el = slideEls[current];
        el.classList.add('active');

        if (el.dataset.type === 'video') {
            const vid = el.querySelector('video');
            vid.currentTime = 0;
            vid.play().catch(() => {});
            vid.onended = next;
        } else {
            const dur = parseFloat(el.dataset.duration);
            requestAnimationFrame(() => {
                progress.style.transition = `width ${dur}s linear`;
                progress.style.width = '100%';
            });
            timer = setTimeout(next, dur * 1000);
        }
    }

    function next() {
        const n = (current + 1) % slideEls.length;
        if (n === 0 && !CONFIG.loop) return;
        showSlide(n);
    }

    // Manual controls
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')                    showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F')           document.documentElement.requestFullscreen?.();
    });
    document.addEventListener('click', next);

    buildSlides();
    if (SLIDES.length > 0) showSlide(0);
    </script>
</body>
</html>
