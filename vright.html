<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Right</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex;
            flex-direction: column;
        }

        /* ── Top accent bar ── */
        #top-bar {
            flex: 0 0 5%;
            background: linear-gradient(135deg, #4EC96A 0%, #3BB85A 100%);
            display: flex;
            align-items: center;
            padding: 0 2.5%;
            gap: 1.5%;
        }
        #top-bar .line {
            height: 3px;
            flex: 1;
            background: rgba(255,255,255,0.35);
            border-radius: 2px;
        }
        #top-bar .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }

        /* ── Slides area ── */
        #slides-area {
            flex: 1;
            position: relative;
            background: #111;
        }

        .slide {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .slide img, .slide canvas {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* ── Bottom bar with logo ── */
        #bottom-bar {
            flex: 0 0 7%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 2%;
            border-top: 2px solid #4EC96A;
        }
        #bottom-bar img#logo {
            height: 50%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="top-bar">
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
            <div class="dot"></div>
        </div>
        <div id="slides-area"></div>
        <div id="bottom-bar">
            <img id="logo" src="Logo_official_eng.png" alt="Tel-Hai">
        </div>
    </div>

    <script>
    // ================================================================
    // CONFIGURATION
    // ================================================================
    var CONFIG = {
        defaultImageDuration: 10,
        loop:    true,
        shuffle: false,
    };

    // Add ?signage to URL for signage mode (rotates videos -90° via canvas)
    var isSignage = window.location.search.indexOf('signage') > -1;

    // ================================================================
    // ENGINE  (slides loaded from slides.json)
    // ================================================================
    var slidesArea = document.getElementById('slides-area');
    var slideEls   = [];
    var current    = 0;
    var timer      = null;

    function isVideo(src) { return /\.(mp4|webm|ogg|mov)$/i.test(src); }

    var list = [];

    // ── Build a video slide with canvas renderer ──────────────────────
    function makeVideoSlide(div, src) {
        var vid = document.createElement('video');
        vid.src     = src;
        vid.muted   = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto'; // buffer fully so first frame is ready
        vid.style.display = 'none'; // video element stays hidden

        var canvas = document.createElement('canvas');
        canvas.width  = 1920; // defaults; overwritten on loadedmetadata
        canvas.height = 1080;
        canvas.style.width  = '100%';
        canvas.style.height = '100%';

        var ctx = canvas.getContext('2d');
        var raf = null;

        vid.addEventListener('loadedmetadata', function() {
            if (isSignage) {
                // Swap dims: landscape video → portrait canvas
                canvas.width  = vid.videoHeight || 1080;
                canvas.height = vid.videoWidth  || 1920;
            } else {
                canvas.width  = vid.videoWidth  || 1920;
                canvas.height = vid.videoHeight || 1080;
            }
        });

        function drawLoop() {
            if (vid.readyState >= 2) { // HAVE_CURRENT_DATA
                var cw = canvas.width, ch = canvas.height;
                if (isSignage) {
                    ctx.save();
                    ctx.translate(cw / 2, ch / 2);
                    ctx.rotate(Math.PI / 2); // -90° to correct for missing metadata
                    ctx.drawImage(vid,
                        -(vid.videoWidth  || ch) / 2,
                        -(vid.videoHeight || cw) / 2,
                         (vid.videoWidth  || ch),
                         (vid.videoHeight || cw));
                    ctx.restore();
                } else {
                    ctx.drawImage(vid, 0, 0, cw, ch);
                }
            }
            raf = requestAnimationFrame(drawLoop);
        }

        div._vidEl  = vid;
        div._start  = function() { if (!raf) drawLoop(); };
        div._stop   = function() { if (raf) { cancelAnimationFrame(raf); raf = null; } };

        div.appendChild(vid);
        div.appendChild(canvas);
    }

    // ── Build all slides ──────────────────────────────────────────────
    function buildSlides() {
        for (var i = 0; i < list.length; i++) {
            var slide = list[i];
            var div   = document.createElement('div');
            div.className = 'slide';

            if (isVideo(slide.src)) {
                div.setAttribute('data-type', 'video');
                makeVideoSlide(div, slide.src);
            } else {
                var img   = document.createElement('img');
                img.src   = slide.src;
                img.alt   = '';
                img.loading = i === 0 ? 'eager' : 'lazy';
                div.setAttribute('data-type', 'image');
                var dur = (slide.duration != null) ? slide.duration : CONFIG.defaultImageDuration;
                div.setAttribute('data-duration', dur);
                div.appendChild(img);
            }

            slidesArea.appendChild(div);
            slideEls.push(div);
        }
    }

    // ── Show a slide ──────────────────────────────────────────────────
    function showSlide(index) {
        if (!slideEls.length) return;

        // Hide / stop all
        for (var j = 0; j < slideEls.length; j++) {
            slideEls[j].classList.remove('active');
            if (slideEls[j]._stop)   slideEls[j]._stop();
            if (slideEls[j]._vidEl) {
                slideEls[j]._vidEl.pause();
                slideEls[j]._vidEl.onended = null;
            }
        }
        clearTimeout(timer);

        current = ((index % slideEls.length) + slideEls.length) % slideEls.length;
        var el  = slideEls[current];
        el.classList.add('active');

        if (el.getAttribute('data-type') === 'video') {
            var vid = el._vidEl;
            vid.currentTime = 0;
            el._start(); // begin canvas render loop
            vid.play()['catch'](function() { next(); });
            vid.onended = function() { el._stop(); next(); };
            timer = setTimeout(function() { el._stop(); next(); }, 60000);

        } else {
            var dur = parseFloat(el.getAttribute('data-duration'));
            var img = el.querySelector('img');
            function startTimer() { timer = setTimeout(next, dur * 1000); }
            if (img && !img.complete) {
                img.onload  = startTimer;
                img.onerror = function() { next(); };
            } else {
                startTimer();
            }
        }
    }

    function next() {
        var n = (current + 1) % slideEls.length;
        if (n === 0 && !CONFIG.loop) return;
        showSlide(n);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ')  next();
        if (e.key === 'ArrowLeft')  showSlide(current - 1);
        if (e.key === 'f' || e.key === 'F') {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    });
    document.addEventListener('click', next);

    // Load slides from central slides.json
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'slides.json');
    xhr.onload = function() {
        if (xhr.status === 200) {
            list = JSON.parse(xhr.responseText);
            if (CONFIG.shuffle) list = list.slice().sort(function() { return Math.random() - 0.5; });
        }
        buildSlides();
        showSlide(0);
    };
    xhr.onerror = function() { buildSlides(); showSlide(0); };
    xhr.send();
    </script>
</body>
</html>
